# mac-security default config manifest
#
# Format: template_relative_path:destination_path
#   - Template paths are relative to configs/templates/
#   - Destination paths support ~ expansion
#   - Lines starting with # are comments; blank lines are ignored
#
# To disable an entry for a specific machine, create a custom manifest at
# configs/manifests/<hostname>.conf and pass it with --manifest.
#
# To add your own entries, copy this file and modify as needed.

# Git global config
git/gitconfig.tmpl:~/.gitconfig

# SSH client config
# Note: this ADDS to ~/.ssh/config, it does not overwrite it.
# Review the rendered output with --dry-run before applying.
ssh/config.tmpl:~/.ssh/config

# Zsh base config
zsh/zshrc-base.tmpl:~/.zshrc-mac-security

# Starship prompt
starship/starship.toml.tmpl:~/.config/starship.toml
